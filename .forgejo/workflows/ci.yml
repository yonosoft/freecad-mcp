name: Python CI

on:
  push:
  pull_request:

jobs:
  quality:
    # Requires a repository or organization Forgejo runner with the docker label.
    runs-on: codeberg-small
    container:
      # Node is required by the checkout action; Debian bookworm supplies Python 3.11.
      image: node:24-bookworm-slim
    steps:
      - name: Check out repository
        uses: https://data.forgejo.org/actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install Python 3.11
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends python3 python3-pip python3-venv
      - name: Create virtual environment
        run: python3 -m venv /tmp/ci-venv
      - name: Install project and development dependencies
        run: /tmp/ci-venv/bin/python -m pip install -e ".[dev]"
      - name: Run quality checks
        run: /tmp/ci-venv/bin/python scripts/ci.py
